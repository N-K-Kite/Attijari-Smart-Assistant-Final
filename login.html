<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – Attijari Bank Smart Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: #F5F6F8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }
    .auth-title {
      font-size: 24px;
      font-weight: 700;
      color: #1A1A1E;
      margin-bottom: 8px;
    }
    .auth-subtitle {
      font-size: 14px;
      color: #6B6C78;
      margin-bottom: 30px;
    }
    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #3f3f46;
      margin-bottom: 6px;
    }
    .input-field {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #E4E4E7;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #F7941D;
      box-shadow: 0 0 0 3px rgba(247,148,29,0.1);
    }
    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #F7941D;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 16px;
    }
    .btn-submit:hover {
      background: #e68310;
    }
    .auth-link {
      font-size: 13px;
      color: #6B6C78;
    }
    .auth-link a {
      color: #F7941D;
      font-weight: 600;
      text-decoration: none;
    }
    .auth-link a:hover {
      text-decoration: underline;
    }
    .error-msg {
      color: #EF4444;
      font-size: 13px;
      background: #FEF2F2;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-logo">
      <img src="attijari_logo.png" alt="Attijari Bank" style="width:40px;height:40px;object-fit:contain;border-radius:8px;"/>
      <div style="text-align:left">
        <div style="font-weight:800;font-size:16px;line-height:1.2;color:#1A1A1E">Attijari Bank</div>
        <div style="font-size:11px;color:#F7941D;font-weight:700">SMART ASSISTANT</div>
      </div>
    </div>
    
    <h1 class="auth-title">Connexion</h1>
    <p class="auth-subtitle">Accédez à votre espace bancaire intelligent</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="input-group">
        <label class="input-label" for="cin">Numéro CIN</label>
        <input type="text" id="cin" class="input-field" placeholder="Ex: 12345678" maxlength="8" required />
      </div>
      
      <div class="input-group">
        <label class="input-label" for="password">Mot de Passe</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Se connecter</button>
    </form>

    <div class="auth-link">
      Nouveau client ? <a href="register.html">Ouvrir un compte</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const cin = document.getElementById('cin').value;
      const pwd = document.getElementById('password').value;
      const errEl = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      errEl.style.display = 'none';
      btn.textContent = 'Connexion...';
      btn.disabled = true;

      try {
        const res = await fetch('api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cin: cin, password: pwd })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = 'index.html'; // auth.js will direct them based on auth status later
        } else {
          errEl.textContent = data.error || 'Erreur de connexion';
          errEl.style.display = 'block';
        }
      } catch (error) {
        errEl.textContent = 'Erreur serveur. Assurez-vous d\'utiliser XAMPP (localhost).';
        errEl.style.display = 'block';
      } finally {
        btn.textContent = 'Se connecter';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
