<div class="auth-body">
  <div class="auth-container">
    <div class="auth-logo">
      <img src="assets/attijari_logo.png" alt="Attijari Bank" style="width:40px;height:40px;object-fit:contain;border-radius:8px;"/>
      <div style="text-align:left">
        <div style="font-weight:800;font-size:16px;line-height:1.2;color:#1A1A1E">Attijari Bank</div>
        <div style="font-size:11px;color:#F7941D;font-weight:700">SMART ASSISTANT</div>
      </div>
    </div>
    
    <h1 class="auth-title">Inscription</h1>
    <p class="auth-subtitle">Créez votre compte pour accéder à l'assistant intelligent</p>

    <div class="error-msg" *ngIf="errorMsg">{{errorMsg}}</div>
    <div class="success-msg" *ngIf="successMsg">{{successMsg}}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="input-group">
        <label class="input-label" for="nom">Nom Complet</label>
        <input type="text" id="nom" [(ngModel)]="nom" name="nom" class="input-field" placeholder="Ex: Jean Dupont" required />
      </div>

      <div class="input-group">
        <label class="input-label" for="email">Adresse Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" class="input-field" placeholder="nom@attijaribank.tn" required />
      </div>
      
      <div class="input-group">
        <label class="input-label" for="password">Mot de Passe</label>
        <input type="password" id="password" [(ngModel)]="password" name="password" class="input-field" placeholder="••••••••" required />
      </div>

      <div class="input-group">
        <label class="input-label" for="confirmPassword">Confirmer le Mot de Passe</label>
        <input type="password" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" class="input-field" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Création...' : 'S\'inscrire' }}
      </button>
    </form>

    <div class="auth-link">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </div>
  </div>
</div>
